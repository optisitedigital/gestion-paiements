<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Admin Dash</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0a0f1f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* SCREEN 1 */
#home{
    text-align:center;
}

h1{
    font-size:40px;
    color:#4ea1ff;
    letter-spacing:2px;
}

button{
    background:#1f6fff;
    border:none;
    padding:12px 20px;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-top:20px;
}

/* SCREEN 2 */
#app{
    display:none;
    width:90%;
    max-width:800px;
}

.search{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
}

.card{
    background:#111a33;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
    <h1>SCHOOL ADMIN DASH</h1>
    <button onclick="openApp()">Analyser les classes</button>
</div>

<!-- APP -->
<div id="app">

    <div class="search">
        <input id="query" placeholder="Tape une classe ex: 4HSCA">
        <button onclick="search()">Rechercher</button>
    </div>

    <div id="results"></div>

</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRr4s9hCjtsmSGohQ5QTa55OeVEifQIF76GATTIg-wgXAqlYZyx84UDZhJE8UsK8d8o0SN15FbbG9-M/pub?output=csv";

function openApp(){
    document.getElementById("home").style.display="none";
    document.getElementById("app").style.display="block";
}

async function fetchData(){
    const res = await fetch(URL + "&t=" + Date.now());
    const text = await res.text();

    return text.split("\n").slice(1).map(r=>{
        const c = r.split(",");
        return {
            name:c[1],
            class:c[2],
            sex:c[3],
            phone:c[4],
            total:Number(c[5]||0),
            paid:Number(c[6]||0),
            date:c[8]
        }
    });
}

async function search(){
    const q = document.getElementById("query").value.trim();

    const data = await fetchData();

    const filtered = data.filter(e => e.class === q);

    const box = document.getElementById("results");
    box.innerHTML = "";

    if(filtered.length === 0){
        box.innerHTML = "<p>Aucun résultat</p>";
        return;
    }

    filtered.forEach(e=>{
        const div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
            <b>${e.name}</b><br>
            Classe: ${e.class}<br>
            Sexe: ${e.sex}<br>
            Tel: ${e.phone}<br>
            Total: ${e.total}<br>
            Payé: ${e.paid}<br>
            Reste: ${e.total - e.paid}<br>
            Date: ${e.date}
        `;

        box.appendChild(div);
    });
}

</script>

</body>
</html>
