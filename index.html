<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Payment Manager | RDC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="flex justify-between items-center mb-12">
        <div>
            <h1 class="text-3xl font-extrabold text-white">School<span class="text-green-500">Payment</span></h1>
            <p class="text-slate-400">Smart tracking system for DRC schools</p>
        </div>
        <button onclick="alert('Accès réservé à l\'administration')" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full font-semibold transition">Connexion Admin</button>
    </header>

    <main class="max-w-2xl mx-auto">
        <div class="glass p-8 rounded-3xl shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">Rechercher un élève</h2>
            <div class="flex gap-2">
                <input type="text" id="studentId" placeholder="Entrer l'ID (ex: E001)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                <button onclick="searchStudent()" class="bg-green-600 hover:bg-green-500 px-8 rounded-xl font-bold transition">Chercher</button>
            </div>
            
            <div id="result" class="mt-8 transition-all duration-500"></div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyFY7juaeqAw6ROSROdFRyGpWrz2XBqRu7-03HgkkDH-QnYIZEYfIB86tRhxNOeIt2P/exec";

        async function searchStudent() {
            const id = document.getElementById('studentId').value;
            const resDiv = document.getElementById('result');
            
            resDiv.innerHTML = "<p class='text-center text-slate-400'>Recherche en cours...</p>";

            try {
                const response = await fetch(`${API_URL}?id=${id}`);
                const data = await response.json();

                if (data.nom) {
                    resDiv.innerHTML = `
                        <div class="glass p-6 rounded-2xl border-l-4 border-green-500 animate-in fade-in zoom-in duration-300">
                            <h3 class="text-xl font-bold">${data.nom}</h3>
                            <p class="text-slate-300">Classe : ${data.classe}</p>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="text-sm">Payé : <b class="text-green-400">${data.paye} $</b></span>
                                <span class="text-sm">Reste : <b class="text-red-400">${data.total - data.paye} $</b></span>
                            </div>
                        </div>
                    `;
                } else {
                    resDiv.innerHTML = "<p class='text-center text-red-400'>Élève introuvable.</p>";
                }
            } catch (error) {
                resDiv.innerHTML = "<p class='text-center text-red-400'>Erreur de connexion au serveur.</p>";
            }
        }
    </script>
</body>
</html>
