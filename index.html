
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack — Suivi Scolaire</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0e1a;
    color: #e2e8f0;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .bg-animated {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, #1a1f3a 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #0f1f2e 0%, transparent 50%), #0a0e1a;
  }
  .particles { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(99,179,237,0.15);
    animation: float linear infinite;
  }
  @keyframes float {
    from { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; } 90% { opacity: 1; }
    to { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
  .wrapper { position: relative; z-index: 1; }

  header { text-align: center; padding: 50px 20px 30px; }
  .logo-icon { font-size: 44px; margin-bottom: 12px; display: inline-block; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(99,179,237,0.4)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(99,179,237,0.8)); }
  }
  h1 {
    font-size: clamp(1.8rem,5vw,3.2rem); font-weight: 800;
    background: linear-gradient(135deg, #63b3ed, #a78bfa, #f687b3);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -1px; margin-bottom: 10px;
  }
  .subtitle { color: #718096; font-size: 1rem; }

  .search-section { display: flex; justify-content: center; padding: 24px 20px 16px; }
  .search-btn {
    background: linear-gradient(135deg, #3182ce, #7c3aed);
    border: none; color: white; padding: 16px 36px; border-radius: 50px;
    font-size: 1.05rem; font-weight: 600; cursor: pointer;
    transition: all 0.3s; box-shadow: 0 4px 30px rgba(99,179,237,0.3);
    display: flex; align-items: center; gap: 10px;
  }
  .search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(99,179,237,0.5); }
  .search-btn:active { transform: scale(0.97); }

  .search-panel {
    max-width: 600px; margin: 0 auto; padding: 0 16px;
    overflow: hidden; max-height: 0;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
    opacity: 0;
  }
  .search-panel.open { max-height: 180px; opacity: 1; }
  .search-box {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 20px; backdrop-filter: blur(20px); margin-bottom: 12px;
  }
  .input-group { display: flex; gap: 10px; align-items: center; }
  .search-input {
    flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; padding: 13px 18px; font-size: 1rem; color: #e2e8f0; outline: none;
    transition: all 0.3s; letter-spacing: 1px; min-width: 0;
  }
  .search-input::placeholder { color: #4a5568; }
  .search-input:focus {
    border-color: #63b3ed; background: rgba(99,179,237,0.08);
    box-shadow: 0 0 0 3px rgba(99,179,237,0.15);
  }
  .go-btn {
    background: linear-gradient(135deg, #3182ce, #7c3aed); border: none; color: white;
    padding: 13px 22px; border-radius: 12px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: all 0.3s; white-space: nowrap; flex-shrink: 0;
  }
  .go-btn:hover { box-shadow: 0 4px 20px rgba(99,179,237,0.4); }
  .hint { color: #4a5568; font-size: 0.78rem; text-align: center; margin-top: 8px; }

  .results-section { max-width: 1000px; margin: 20px auto; padding: 0 12px 40px; }

  .results-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .class-title {
    font-size: 1.4rem; font-weight: 700;
    background: linear-gradient(135deg, #63b3ed, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(72,187,120,0.1); border: 1px solid rgba(72,187,120,0.25);
    border-radius: 50px; padding: 5px 14px; font-size: 0.78rem; color: #68d391;
  }
  .live-dot {
    width: 7px; height: 7px; background: #48bb78; border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; box-shadow: 0 0 4px #48bb78; }
    50% { opacity: 0.3; }
  }

  .summary-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px; margin-bottom: 20px;
  }
  .sum-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px 12px; text-align: center;
  }
  .sum-label { font-size: 0.7rem; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .sum-value { font-size: 1.4rem; font-weight: 800; }
  .sum-value.blue { color: #63b3ed; }
  .sum-value.green { color: #68d391; }
  .sum-value.yellow { color: #f6ad55; }
  .sum-value.red { color: #fc8181; }

  /* CARTES MOBILES */
  .cards-list { display: flex; flex-direction: column; gap: 12px; }

  .elev-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 16px; animation: rowIn 0.4s ease both;
    transition: background 0.2s;
  }
  .elev-card:hover { background: rgba(255,255,255,0.07); }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; gap: 8px;
  }
  .card-name { font-size: 1rem; font-weight: 700; color: #e2e8f0; flex: 1; min-width: 0; }
  .card-id { font-size: 0.75rem; color: #4a5568; font-family: monospace; }

  .card-info {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 12px;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 0.68rem; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px; }
  .info-value { font-size: 0.88rem; color: #a0aec0; }

  .card-phone-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; background: rgba(99,179,237,0.1); border: 1px solid rgba(99,179,237,0.25);
    border-radius: 10px; padding: 10px; color: #63b3ed; font-size: 0.88rem;
    font-weight: 600; cursor: pointer; text-decoration: none;
    transition: all 0.2s; margin-bottom: 10px;
  }
  .card-phone-btn:hover { background: rgba(99,179,237,0.2); }
  .card-phone-btn.no-phone { color: #4a5568; border-color: rgba(255,255,255,0.08); cursor: default; }

  .card-payment {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px 12px;
  }
  .payment-info { flex: 1; min-width: 0; }
  .payment-amounts { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; }
  .amount-paid { color: #68d391; font-weight: 600; }
  .amount-total { color: #718096; }
  .progress-bar {
    height: 5px; background: rgba(255,255,255,0.08);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .fill-green { background: linear-gradient(90deg, #48bb78, #68d391); }
  .fill-yellow { background: linear-gradient(90deg, #ed8936, #f6ad55); }
  .fill-red { background: linear-gradient(90deg, #e53e3e, #fc8181); }

  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 5px 12px; border-radius: 50px; font-size: 0.72rem; font-weight: 700;
    white-space: nowrap; flex-shrink: 0;
  }
  .badge-paid { background: rgba(72,187,120,0.15); color: #68d391; border: 1px solid rgba(72,187,120,0.3); }
  .badge-partial { background: rgba(246,173,85,0.15); color: #f6ad55; border: 1px solid rgba(246,173,85,0.3); }
  .badge-unpaid { background: rgba(252,129,129,0.15); color: #fc8181; border: 1px solid rgba(252,129,129,0.3); }
  .badge-m { background: rgba(99,179,237,0.1); color: #63b3ed; border: 1px solid rgba(99,179,237,0.2); }
  .badge-f { background: rgba(246,135,177,0.1); color: #f687b3; border: 1px solid rgba(246,135,177,0.2); }

  .loading-overlay { text-align: center; padding: 60px 20px; color: #4a5568; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(99,179,237,0.2);
    border-top-color: #63b3ed; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { text-align: center; padding: 40px; color: #fc8181; line-height: 1.8; }
  .empty-msg { text-align: center; padding: 50px 20px; color: #4a5568; }
  .class-chip {
    display: inline-block; color: #63b3ed; cursor: pointer;
    background: rgba(99,179,237,0.1); border: 1px solid rgba(99,179,237,0.2);
    border-radius: 50px; padding: 3px 12px; margin: 3px; font-size: 0.82rem;
    transition: background 0.2s;
  }
  .class-chip:hover { background: rgba(99,179,237,0.2); }

  footer { text-align: center; padding: 30px 20px; color: #2d3748; font-size: 0.78rem; }
</style>
</head>
<body>

<div class="bg-animated"></div>
<div class="particles" id="particles"></div>

<div class="wrapper">
  <header>
    <div class="logo-icon">🎓</div>
    <h1>EduTrack</h1>
    <p class="subtitle">Système de Suivi Scolaire — Données en temps réel</p>
  </header>

  <div class="search-section">
    <button class="search-btn" id="toggleSearchBtn" onclick="toggleSearch()">
      <span>🔍</span> Rechercher une classe
    </button>
  </div>

  <div class="search-panel" id="searchPanel">
    <div class="search-box">
      <div class="input-group">
        <input class="search-input" id="classInput" type="text"
          placeholder="Ex : 4HSCA, 3eme B..."
          onkeydown="if(event.key==='Enter') doSearch()"
          autocomplete="off" autocapitalize="characters" />
        <button class="go-btn" onclick="doSearch()">Chercher</button>
      </div>
      <p class="hint">Tapez le code de la classe puis appuyez sur Entrée</p>
    </div>
  </div>

  <div class="results-section" id="resultsSection"></div>

  <footer>EduTrack © 2025 — Synchronisé avec Google Sheets</footer>
</div>

<script>
const SHEET_ID = "2PACX-1vRr4s9hCjtsmSGohQ5QTa55OeVEifQIF76GATTIg-wgXAqlYZyx84UDZhJE8UsK8d8o0SN15FbbG9-M";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/" + SHEET_ID + "/pub?output=csv";

let allData = [];
let searchOpen = false;

function createParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 5 + 2;
    p.style.cssText = "width:"+s+"px;height:"+s+"px;left:"+(Math.random()*100)+"%;animation-duration:"+(Math.random()*20+15)+"s;animation-delay:"+(Math.random()*15)+"s;";
    c.appendChild(p);
  }
}

function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('searchPanel').classList.toggle('open', searchOpen);
  document.getElementById('toggleSearchBtn').innerHTML = searchOpen
    ? '<span>✕</span> Fermer'
    : '<span>🔍</span> Rechercher une classe';
  if (searchOpen) setTimeout(() => document.getElementById('classInput').focus(), 300);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    const vals = [];
    let cur = '', inQ = false;
    for (let ci = 0; ci < line.length; ci++) {
      if (line[ci] === '"') { inQ = !inQ; }
      else if (line[ci] === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += line[ci]; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx]||'').replace(/^"|"$/g,'').trim(); });
    if (Object.values(obj).some(v => v !== '')) rows.push(obj);
  }
  return rows;
}

async function fetchData() {
  const proxy = "https://corsproxy.io/?" + encodeURIComponent(SHEET_URL + "&t=" + Date.now());
  try {
    const res = await fetch(proxy);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (!text || text.length < 5) throw new Error('vide');
    allData = parseCSV(text);
  } catch(e) {
    const res2 = await fetch(SHEET_URL + "&t=" + Date.now());
    const text2 = await res2.text();
    allData = parseCSV(text2);
  }
}

function getField(r, ...keys) {
  for (const k of keys) { if (r[k] !== undefined && r[k] !== '') return r[k]; }
  return '';
}

// Logique statut paiement : soldé si paid >= total (et total > 0)
function payStatus(paidRaw, totalRaw) {
  const paid = parseFloat(paidRaw) || 0;
  const total = parseFloat(totalRaw) || 0;
  if (total === 0) return { label: '—', cls: '', pct: 0, fillCls: 'fill-red' };
  const pct = Math.min(100, Math.round((paid / total) * 100));
  if (paid >= total) return { label: '✓ Soldé', cls: 'badge-paid', pct: 100, fillCls: 'fill-green' };
  if (paid > 0)      return { label: '⚑ Partiel ' + pct + '%', cls: 'badge-partial', pct, fillCls: 'fill-yellow' };
  return              { label: '✗ Impayé', cls: 'badge-unpaid', pct: 0, fillCls: 'fill-red' };
}

function fmtMoney(val) {
  const n = parseFloat(val || 0);
  return isNaN(n) ? (val || '—') : n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' $';
}

function fmtPhone(phone) {
  return phone ? phone.replace(/\s+/g,'') : '';
}

async function doSearch() {
  const query = document.getElementById('classInput').value.trim();
  if (!query) return;
  const q = query.toUpperCase();
  const section = document.getElementById('resultsSection');
  section.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><p>Chargement pour <strong>' + query + '</strong>...</p></div>';

  try {
    await fetchData();
  } catch(err) {
    section.innerHTML = '<div class="error-msg">❌ Impossible de charger les données.<br><small>Hébergez le fichier sur <a href="https://netlify.com/drop" target="_blank" style="color:#63b3ed">netlify.com/drop</a> pour que ça fonctionne.</small></div>';
    return;
  }

  const found = allData.filter(r => {
    const cls = getField(r,'class','classe','class_','classes').toUpperCase().trim();
    return cls === q || cls.includes(q) || q.includes(cls);
  });

  if (!found.length) {
    const classes = [...new Set(allData.map(r => getField(r,'class','classe','class_')).filter(Boolean))];
    const chips = classes.map(c => '<span class="class-chip" onclick="document.getElementById(\'classInput\').value=\''+c+'\';doSearch()">'+c+'</span>').join('');
    section.innerHTML = '<div class="empty-msg"><div style="font-size:2.5rem;margin-bottom:12px">🔎</div><p style="color:#a0aec0;font-size:1rem;margin-bottom:8px">Aucun élève pour <strong style="color:#63b3ed">'+query+'</strong></p>'+(classes.length?'<p style="font-size:0.82rem;color:#4a5568;margin-bottom:10px">Classes disponibles :</p><div>'+chips+'</div>':'')+'</div>';
    return;
  }

  let totalF=0, totalP=0, countPaid=0, countUnpaid=0, countPartial=0;
  found.forEach(r => {
    const t = parseFloat(getField(r,'total'))||0;
    const p = parseFloat(getField(r,'paid','payed'))||0;
    totalF += t; totalP += p;
    const st = payStatus(p, t);
    if (st.cls==='badge-paid') countPaid++;
    else if (st.cls==='badge-unpaid') countUnpaid++;
    else if (st.cls==='badge-partial') countPartial++;
  });

  const cards = found.map((r, i) => {
    const name  = getField(r,'name','nom') || '—';
    const id    = getField(r,'id') || (i+1);
    const sex   = getField(r,'sex','sexe','genre').toUpperCase();
    const phone = fmtPhone(getField(r,'phone','tel','telephone'));
    const total = getField(r,'total');
    const paid  = getField(r,'paid','payed');
    const year  = getField(r,'year','annee','année');
    const date  = getField(r,'date');
    const st    = payStatus(paid, total);
    const sexBadge = sex==='F'
      ? '<span class="badge badge-f">♀ F</span>'
      : sex==='M' ? '<span class="badge badge-m">♂ M</span>'
      : sex ? '<span style="color:#a0aec0">'+sex+'</span>' : '';

    const phoneBtn = phone
      ? '<a class="card-phone-btn" href="tel:'+phone+'">📞 Appeler — '+phone+'</a>'
      : '<div class="card-phone-btn no-phone">📵 Pas de téléphone</div>';

    return '<div class="elev-card" style="animation-delay:'+( i*0.05)+'s">'
      + '<div class="card-top">'
      +   '<span class="card-name">'+name+'</span>'
      +   '<span class="card-id">#'+id+'</span>'
      + '</div>'
      + '<div class="card-info">'
      +   '<div class="info-item"><span class="info-label">Sexe</span><span class="info-value">'+sexBadge+'</span></div>'
      +   '<div class="info-item"><span class="info-label">Année</span><span class="info-value">'+(year||'—')+'</span></div>'
      +   '<div class="info-item"><span class="info-label">Date</span><span class="info-value" style="font-size:0.8rem">'+(date||'—')+'</span></div>'
      +   '<div class="info-item"><span class="info-label">Classe</span><span class="info-value">'+q+'</span></div>'
      + '</div>'
      + phoneBtn
      + '<div class="card-payment">'
      +   '<div class="payment-info">'
      +     '<div class="payment-amounts"><span class="amount-paid">Payé : '+fmtMoney(paid)+'</span><span class="amount-total">/ '+fmtMoney(total)+'</span></div>'
      +     '<div class="progress-bar"><div class="progress-fill '+st.fillCls+'" style="width:'+st.pct+'%"></div></div>'
      +   '</div>'
      +   '<span class="badge '+st.cls+'" style="margin-left:10px">'+st.label+'</span>'
      + '</div>'
      + '</div>';
  }).join('');

  section.innerHTML =
    '<div class="results-header">'
    + '<div><p class="class-title">Classe : '+q+'</p><p style="color:#718096;font-size:0.82rem;margin-top:3px">'+found.length+' élève'+(found.length>1?'s':'')+' trouvé'+(found.length>1?'s':'')+'</p></div>'
    + '<div class="live-badge"><div class="live-dot"></div> En direct</div>'
    + '</div>'
    + '<div class="summary-cards">'
    +   '<div class="sum-card"><div class="sum-label">Élèves</div><div class="sum-value blue">'+found.length+'</div></div>'
    +   '<div class="sum-card"><div class="sum-label">Total frais</div><div class="sum-value yellow">'+fmtMoney(totalF)+'</div></div>'
    +   '<div class="sum-card"><div class="sum-label">Payé</div><div class="sum-value green">'+fmtMoney(totalP)+'</div></div>'
    +   '<div class="sum-card"><div class="sum-label">Restant</div><div class="sum-value red">'+fmtMoney(totalF-totalP)+'</div></div>'
    +   '<div class="sum-card"><div class="sum-label">Soldés</div><div class="sum-value green">'+countPaid+'</div></div>'
    +   '<div class="sum-card"><div class="sum-label">Partiels</div><div class="sum-value yellow">'+countPartial+'</div></div>'
    +   '<div class="sum-card"><div class="sum-label">Impayés</div><div class="sum-value red">'+countUnpaid+'</div></div>'
    + '</div>'
    + '<div class="cards-list">'+cards+'</div>';
}

createParticles();
</script>
</body>
</html>
