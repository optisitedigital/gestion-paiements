<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiSchool - Gestion des Élèves</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-12">

    <nav class="bg-blue-600 text-white shadow-md px-4 py-3 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold tracking-wide">🏫 OptiSchool RDC</h1>
        <button id="btn-nav-admin" onclick="toggleView('login')" class="bg-blue-700 hover:bg-blue-800 text-sm px-4 py-2 rounded-lg transition font-medium">Espace Admin</button>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-6">

        <div id="section-public" class="space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-100 text-center">
                    <p class="text-gray-500 text-xs font-semibold uppercase">Total Élèves</p>
                    <p id="stat-total" class="text-3xl font-bold text-blue-600 mt-1">0</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-100 text-center">
                    <p class="text-gray-500 text-xs font-semibold uppercase">En Règle</p>
                    <p id="stat-regle" class="text-3xl font-bold text-green-600 mt-1">0</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-100 text-center col-span-2 md:col-span-1">
                    <p class="text-gray-500 text-xs font-semibold uppercase">Litiges / Restes</p>
                    <p id="stat-litige" class="text-3xl font-bold text-red-600 mt-1">0</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-lg font-bold text-gray-900">🔍 Vérifier le statut d'un élève</h3>
                <div class="flex gap-2">
                    <input type="text" id="search-input" placeholder="Entrez l'identifiant exact (ex: STU001)..." class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-base">
                    <button onclick="searchStudent()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium transition">Chercher</button>
                </div>
            </div>

            <div id="search-result" class="hidden bg-white p-6 rounded-2xl shadow-md border border-gray-100">
                </div>
        </div>

        <div id="section-login" class="hidden max-w-md mx-auto bg-white p-6 rounded-2xl shadow-xl border border-gray-100 mt-12 space-y-4">
            <h3 class="text-xl font-bold text-gray-900 text-center">🔐 Connexion Administration</h3>
            <p class="text-xs text-gray-500 text-center">Réservé uniquement à la direction de l'école</p>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Identifiant Email</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Mot de passe</label>
                    <input type="password" id="login-pass" required class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="toggleView('public')" class="w-1/2 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl font-medium transition text-sm">Annuler</button>
                    <button type="submit" class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-medium transition text-sm shadow-sm">Se connecter</button>
                </div>
            </form>
        </div>

        <div id="section-admin" class="hidden bg-white p-6 rounded-2xl shadow-xl border border-gray-100 space-y-6 mt-6">
            <div class="flex justify-between items-center border-b border-gray-100 pb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">🛠️ Panneau de Contrôle Directeur</h2>
                    <p class="text-xs text-green-600 font-medium">Session sécurisée active</p>
                </div>
                <button onclick="logout()" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 font-bold px-3 py-1.5 rounded-lg transition">Déconnexion</button>
            </div>

            <form onsubmit="handleAddStudent(event)" class="space-y-4 bg-gray-50 p-4 rounded-xl border border-gray-200/60">
                <h4 class="font-bold text-gray-800 text-sm uppercase tracking-wide">➕ Inscrire un nouvel élève</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="add-id" placeholder="ID Unique (ex: STU004)" required class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm">
                    <input type="text" id="add-name" placeholder="Nom complet de l'élève" required class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm">
                    
                    <select id="add-class" required class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm">
                        <option value="" disabled selected>-- Choisir la Classe --</option>
                        <option value="1ère Primaire A">1ère Primaire A</option>
                        <option value="2ème Primaire B">2ème Primaire B</option>
                        <option value="4HSC A">4HSC A</option>
                        <option value="1ère Humanité Commerciale">1ère Humanité Commerciale</option>
                    </select>

                    <select id="add-sex" required class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm">
                        <option value="M">Masculin (M)</option>
                        <option value="F">Féminin (F)</option>
                    </select>
                    <input type="text" id="add-phone" placeholder="Téléphone Parent (ex: +243...)" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm">
                    <input type="number" id="add-total" placeholder="Frais Scolaires Totaux ($)" required class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm">
                    <input type="number" id="add-paid" placeholder="Montant déjà payé ($)" required class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm">
                    <input type="text" id="add-year" value="2024-2025" placeholder="Année Scolaire" required class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm">
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-xl transition text-sm mt-2 shadow-xs">Enregistrer l'Élève sur le Google Sheet</button>
            </form>
        </div>

    </div>

    <script>
        // Ton URL Apps Script fournie est directement configurée ici
        const API_URL = "https://script.google.com/macros/s/AKfycbyKMy7xYHdTYsfNmrr1EuD1IOoLPBZP5WG8XGGXWNfuYynvdXde_VS-9xmFWLTZ2B_X/exec"; 
        
        let allStudents = [];

        // Chargement automatique au démarrage du site
        window.addEventListener('DOMContentLoaded', () => {
            loadDatabase();
        });

        // Récupère les données en direct depuis ton Google Sheet
        async function loadDatabase() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                if (result.success) {
                    allStudents = result.data;
                    calculateStats();
                } else {
                    console.error("Erreur de lecture du Sheet :", result.error);
                }
            } catch (err) {
                console.error("Erreur réseau :", err);
            }
        }

        // Calcule les statistiques globales pour l'affichage public
        function calculateStats() {
            document.getElementById('stat-total').innerText = allStudents.length;
            let regle = 0;
            let litige = 0;

            allStudents.forEach(stu => {
                let total = parseFloat(stu.total) || 0;
                let paid = parseFloat(stu.paid) || 0;
                if (paid >= total && total > 0) {
                    regle++;
                } else {
                    litige++;
                }
            });

            document.getElementById('stat-regle').innerText = regle;
            document.getElementById('stat-litige').innerText = litige;
        }

        // Système de recherche public par ID
        function searchStudent() {
            const searchId = document.getElementById('search-input').value.trim().toUpperCase();
            const resultZone = document.getElementById('search-result');
            
            if(!searchId) {
                alert("Veuillez entrer un ID d'élève.");
                return;
            }

            const student = allStudents.find(s => String(s.id).toUpperCase() === searchId);

            resultZone.classList.remove('hidden');
            if(!student) {
                resultZone.innerHTML = `<p class="text-center text-red-500 font-bold">❌ Aucun élève trouvé avec l'identifiant "${searchId}". Vérifiez la saisie.</p>`;
                return;
            }

            let total = parseFloat(student.total) || 0;
            let paid = parseFloat(student.paid) || 0;
            let reste = total - paid;
            let isRegle = paid >= total;
            let avatar = student.photo || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(student.name)}`;

            resultZone.innerHTML = `
                <div class="flex flex-col sm:flex-row items-center gap-6">
                    <img src="${avatar}" alt="Photo" class="w-24 h-24 rounded-full object-cover border-4 ${isRegle ? 'border-green-500' : 'border-red-400'}">
                    <div class="flex-1 text-center sm:text-left space-y-1.5">
                        <h4 class="text-xl font-bold text-gray-900">${student.name}</h4>
                        <p class="text-sm text-gray-600">🆔 ID : <span class="font-mono font-bold">${student.id}</span> | 🏫 Classe : <span class="font-semibold">${student.class}</span></p>
                        <p class="text-sm text-gray-600">👫 Sexe : ${student.sex} | 📅 Année : ${student.year}</p>
                        <div class="pt-2 grid grid-cols-3 gap-2 text-center text-xs">
                            <div class="bg-gray-100 p-2 rounded-lg"><p class="text-gray-500">Total Dû</p><p class="font-bold text-base">${total} $</p></div>
                            <div class="bg-green-50 p-2 rounded-lg"><p class="text-green-600">Payé</p><p class="font-bold text-base text-green-600">${paid} $</p></div>
                            <div class="${isRegle ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'} p-2 rounded-lg">
                                <p>${isRegle ? 'Statut' : 'Reste'}</p>
                                <p class="font-bold text-base">${isRegle ? 'En Règle' : reste + ' $'}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Vérification de la connexion Admin
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if (email === "admin@school.cd" && pass === "admin123") {
                toggleView('admin');
                document.getElementById('login-email').value = "";
                document.getElementById('login-pass').value = "";
            } else {
                alert("Identifiants de direction incorrects ! Accès refusé.");
            }
        }

        // Déconnexion de l'espace admin
        function logout() {
            toggleView('public');
        }

        // Envoi des données (POST) : Ajout d'un élève sur Google Sheet
        async function handleAddStudent(e) {
            e.preventDefault();
            
            const newStudent = {
                id: document.getElementById('add-id').value.trim(),
                name: document.getElementById('add-name').value.trim(),
                class: document.getElementById('add-class').value,
                sex: document.getElementById('add-sex').value,
                phone: document.getElementById('add-phone').value.trim(),
                total: Number(document.getElementById('add-total').value),
                paid: Number(document.getElementById('add-paid').value),
                year: document.getElementById('add-year').value.trim(),
                date: new Date().toISOString().split('T')[0],
                photo: "" 
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'add',
                        data: newStudent
                    })
                });
                
                const result = await response.json();
                if(result.success) {
                    alert("Succès ! L'élève a été écrit sur votre Google Sheet.");
                    // Réinitialise le formulaire d'ajout
                    document.getElementById('add-id').value = "";
                    document.getElementById('add-name').value = "";
                    document.getElementById('add-class').value = "";
                    document.getElementById('add-phone').value = "";
                    document.getElementById('add-total').value = "";
                    document.getElementById('add-paid').value = "";
                    
                    // Actualise immédiatement les compteurs publics
                    loadDatabase();
                } else {
                    alert("Erreur lors de l'écriture : " + result.error);
                }
            } catch (err) {
                alert("Erreur de communication réseau avec Google Sheets.");
                console.error(err);
            }
        }

        // Gestionnaire d'affichage des sections (Sécurité visuelle complète)
        function toggleView(view) {
            const secPublic = document.getElementById('section-public');
            const secLogin = document.getElementById('section-login');
            const secAdmin = document.getElementById('section-admin');
            const btnNav = document.getElementById('btn-nav-admin');

            // Masque absolument tout par défaut
            secPublic.classList.add('hidden');
            secLogin.classList.add('hidden');
            secAdmin.classList.add('hidden');

            if (view === 'public') {
                secPublic.classList.remove('hidden');
                btnNav.innerText = "Espace Admin";
                btnNav.setAttribute('onclick', "toggleView('login')");
            } else if (view === 'login') {
                secLogin.classList.remove('hidden');
                btnNav.innerText = "Retour Accueil";
                btnNav.setAttribute('onclick', "toggleView('public')");
            } else if (view === 'admin') {
                secAdmin.classList.remove('hidden');
                btnNav.innerText = "Voir le Site Public";
                btnNav.setAttribute('onclick', "toggleView('public')");
            }
        }
    </script>
</body>
</html>
